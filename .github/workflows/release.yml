name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without leading v"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] build

      - name: Validate workflow is running on main
        run: |
          current_branch="$(git branch --show-current)"
          if [ "$current_branch" != "main" ]; then
            echo "release workflow must run on main, got: $current_branch" >&2
            exit 1
          fi

      - name: Validate version matches pyproject
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          project_version="$(python - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as fh:
              data = tomllib.load(fh)
          print(data["project"]["version"])
          PY
          )"
          if [ "$project_version" != "$RELEASE_VERSION" ]; then
            echo "pyproject version $project_version does not match requested release $RELEASE_VERSION" >&2
            exit 1
          fi

      - name: Validate changelog unreleased section is not placeholder
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path("CHANGELOG.md").read_text().splitlines()

          try:
              start = lines.index("## Unreleased") + 1
          except ValueError:
              raise SystemExit("CHANGELOG.md is missing the Unreleased section")

          end = len(lines)
          for idx in range(start, len(lines)):
              if idx > start and lines[idx].startswith("## "):
                  end = idx
                  break

          body = [line.strip() for line in lines[start:end]]
          meaningful_entries = [
              line
              for line in body
              if line.startswith("- ")
              and line not in {"- Nothing yet.", "- Update this section when a branch is ready for release."}
          ]
          if not meaningful_entries:
              raise SystemExit("CHANGELOG.md Unreleased section does not contain release content")
          PY

      - name: Run ruff
        run: python -m ruff check src tests

      - name: Run pytest
        run: python -m pytest

      - name: Build package
        run: python -m build

      - name: Ensure tag does not already exist
        env:
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          if git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "tag already exists: $RELEASE_TAG" >&2
            exit 1
          fi

      - name: Create and push tag
        env:
          RELEASE_TAG: v${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"
