name: codex-auth
description: "Authorize and verify OpenAI Codex credentials"
version: "0.1"
start: explain_authorization

inputs: {}

steps:
  - notify: explain_authorization
    format: markdown
    message: |
      This flow will authorize OpenAI Codex and save credentials in:

      ```text
      ~/.skiller/secrets/openai-codex.json
      ```
    next: request_device_authorization

  - shell: request_device_authorization
    command: python3 packages/skiller/agents/codex-auth/codex_auth.py request-device-code
    cwd: .
    timeout: 30
    check: true
    next: load_user_code

  - shell: load_user_code
    command: python3 packages/skiller/agents/codex-auth/codex_auth.py user-code
    cwd: .
    timeout: 15
    check: true
    next: open_device_authorization

  - notify: open_device_authorization
    format: markdown
    message: |
      Enter this code in the OpenAI authorization page:

      ```text
      {{output_value("load_user_code").stdout}}
      ```
    action:
      type: open_url
      label: "Open OpenAI authorization"
      url: '{{output_value("request_device_authorization").stdout}}'
      auto_open: true
    next: poll_device_auth

  - shell: poll_device_auth
    command: python3 packages/skiller/agents/codex-auth/codex_auth.py poll-device-auth
    cwd: .
    timeout: 960
    check: true
    next: exchange_device_authorization

  - shell: exchange_device_authorization
    command: python3 packages/skiller/agents/codex-auth/codex_auth.py exchange-token
    cwd: .
    timeout: 60
    check: true
    next: require_credentials

  - shell: require_credentials
    command: python3 packages/skiller/agents/codex-auth/codex_auth.py status --require
    cwd: .
    timeout: 15
    check: true
    next: verify_credentials

  - shell: verify_credentials
    command: python3 packages/skiller/agents/codex-auth/codex_auth.py verify --model "${SKILLER_OPENAI_CODEX_MODEL:-gpt-5.5}"
    cwd: .
    timeout: 120
    check: true
    next: credentials_ready

  - notify: credentials_ready
    format: markdown
    message: |
      Codex credentials are valid.

      ```text
      {{output_value("verify_credentials").stdout}}
      ```
