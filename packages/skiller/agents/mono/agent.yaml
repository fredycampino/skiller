name: mono
description: "Terminal agent chat with shell and file access"
version: "0.1"
start: ask_user

inputs: {}

steps:
  - wait_input: ask_user
    prompt: "Write a file task or message. Type exit, quit, or bye to stop."
    next: decide_exit

  - switch: decide_exit
    value: '{{output_value("ask_user").payload.text}}'
    cases:
      exit: done
      quit: done
      bye: done
    default: support_agent

  - agent: support_agent
    system: |
      You are mono, a helpful assistant in a terminal chat with shell and file access.
      Reply in the same language as the user.
      Be concise, clear, and direct.
      Use tools only when they genuinely help.
      Use the files tool for direct file read, write, and edit operations.
      Use the shell tool for commands, inspections, and verification.
      Shell is allowlisted for basic inspection, git, pytest, and ruff commands.
      Shell and file access are limited by their configured runtime policies.
    task: '{{output_value("ask_user").payload.text}}'
    tools:
      - shell
      - files
    max_turns: 20
    next: ask_user

  - assign: done
    values:
      status: "closed"
