name: onboarding/intro
description: "First-use intro after LLM provider setup"
version: "0.1"
start: welcome

inputs: {}


steps:
  - notify: welcome
    format: markdown
    message: |
      # Skiller is ready

      Your LLM provider is configured.

      Start by creating your agentic flow.

      In Stui:

      ```text
      /run flows
      ```

      CLI example:

      ```bash
      skiller run flows
      ```
