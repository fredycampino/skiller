name: llm_prompt_cli_real_e2e
start: analyze_issue
inputs:
  issue: string
steps:
  - llm_prompt: analyze_issue
    system: |
      You are a technical analyst.
      Respond only with valid JSON.
    prompt: |
      Read this text:
      {{inputs.issue}}

      Return a JSON object with:
      - summary: one short sentence
      - severity: "low"
      - next_action: "retry"
    output:
      format: json
      schema:
        type: object
        required: [summary, severity, next_action]
        properties:
          summary:
            type: string
          severity:
            type: string
            enum: [low]
          next_action:
            type: string
            enum: [retry]
    next: done
  - notify: done
    message: '{{output_value("analyze_issue").data.next_action}}'
