name: notify_link_cli_e2e
description: "CLI e2e for notify action link"
version: "0.1"
start: auth_link

inputs: {}

steps:
  - notify: auth_link
    format: markdown
    message: >
      Authorize the app with the external provider. This message is intentionally
      long so the TUI notification can show how action text wraps while keeping
      the button aligned on the right side.
    action:
      type: open_url
      label: "Open authorization"
      url: "https://www.google.com/"
      auto_open: true
    next: wait_any_text

  - wait_input: wait_any_text
    prompt: "Type any text to finish"
    next: done

  - notify: done
    message: "Done."
