name: chat
description: "Direct chat loop with the LLM until the user types exit, quit, or bye"
version: "0.1"
start: ask_user

inputs: {}

steps:
  - wait_input: ask_user
    prompt: "Write a message. Type exit, quit, or bye to stop."
    next: decide_exit

  - switch: decide_exit
    value: '{{output_value("ask_user").payload.text}}'
    cases:
      exit: done
      quit: done
      bye: done
    default: answer

  - llm_prompt: answer
    system: |
      You are a helpful assistant in a terminal chat.
      Be concise, clear, and direct.
      Return only valid JSON.
      Do not wrap the response in markdown.
      Do not include explanations outside the JSON object.
      The response must have exactly this shape:
      {"reply":"<text>"}
      The value of "reply" must always be a string.
    prompt: |
      User message:
      {{output_value("ask_user").payload.text}}
      
      Return JSON with exactly one field:
      {"reply":"<your response>"}
    output:
      format: json
      schema:
        type: object
        required: [reply]
        properties:
          reply:
            type: string
        additionalProperties: false
    large_result: true
    next: ask_user

  - notify: done
    message: "Chat closed."
