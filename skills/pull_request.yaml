name: pull_request
description: "Open a GitHub pull request for a branch workflow"
version: "0.1"
start: create_pr

inputs:
  owner: string
  repo: string
  head: string
  base: string
  title: string
  body: string

mcp:
  - name: github
    transport: streamable-http
    url: "{{env.AGENT_GITHUB_MCP_URL}}"
    headers:
      Authorization: "Bearer {{env.AGENT_GITHUB_MCP_TOKEN}}"

steps:
  - mcp: create_pr
    server: github
    tool: create_pull_request
    args:
      owner: "{{inputs.owner}}"
      repo: "{{inputs.repo}}"
      head: "{{inputs.head}}"
      base: "{{inputs.base}}"
      title: "{{inputs.title}}"
      body: "{{inputs.body}}"
    next: done

  - notify: done
    message: "pull request created for {{inputs.owner}}/{{inputs.repo}} {{inputs.head}} -> {{inputs.base}}"
