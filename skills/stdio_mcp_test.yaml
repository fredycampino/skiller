name: stdio_mcp_test
description: "Minimal MCP test over stdio"
version: "0.1"
start: create_file

inputs:
  file_path: string
  content: string

mcp:
  - name: local-mcp
    transport: stdio
    command: .venv/bin/python
    args:
      - tests/integration/runtime/fixtures/mcp/test_file_mcp_server.py
    cwd: .
    env:
      FILES_ALLOWED_ROOTS: /tmp

steps:
  - mcp: create_file
    server: local-mcp
    tool: files_action
    args:
      action: create
      path: "{{inputs.file_path}}"
      content: "{{inputs.content}}"
