name: webhook_signal_oracle
description: "Wait for a webhook, classify it with an LLM, and route the response"
version: "0.1"
start: wait_signal

inputs:
  key: string

steps:
  - wait_webhook: wait_signal
    webhook: signal
    key: "{{inputs.key}}"
    next: analyze_signal

  - llm_prompt: analyze_signal
    system: |
      You are an analyst of external signals.
      Respond only with valid JSON.
    prompt: |
      This webhook has arrived:
      {{step_executions.wait_signal.output.value.payload}}

      Classify it and return a JSON object with:
      - summary: one short, clear sentence
      - mood: "bright", "tense", or "calm"
      - next_action: "celebrate", "investigate", or "ignore"
    output:
      format: json
      schema:
        type: object
        required: [summary, mood, next_action]
        properties:
          summary:
            type: string
          mood:
            type: string
            enum: [bright, tense, calm]
          next_action:
            type: string
            enum: [celebrate, investigate, ignore]
    next: route_signal

  - switch: route_signal
    value: "{{step_executions.analyze_signal.output.value.data.next_action}}"
    cases:
      celebrate: celebrate_notice
      investigate: investigate_notice
      ignore: ignore_notice
    default: unknown_notice

  - notify: celebrate_notice
    message: "Celebrate: {{step_executions.analyze_signal.output.value.data.summary}}"

  - notify: investigate_notice
    message: "Investigate now: {{step_executions.analyze_signal.output.value.data.summary}}"

  - notify: ignore_notice
    message: "Ignore for now: {{step_executions.analyze_signal.output.value.data.summary}}"

  - notify: unknown_notice
    message: "The signal could not be routed cleanly."
