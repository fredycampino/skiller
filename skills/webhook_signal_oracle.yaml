name: webhook_signal_oracle
description: "Wait for a webhook, classify it with an LLM, and route the response"
version: "0.1"

inputs:
  key: string

steps:
  - id: start
    type: wait_webhook
    webhook: signal
    key: "{{inputs.key}}"
    next: analyze_signal

  - id: analyze_signal
    type: llm_prompt
    system: |
      You are an analyst of external signals.
      Respond only with valid JSON.
    prompt: |
      This webhook has arrived:
      {{results.start.payload}}

      Classify it and return a JSON object with:
      - summary: one short, clear sentence
      - mood: "bright", "tense", or "calm"
      - next_action: "celebrate", "investigate", or "ignore"
    output:
      format: json
      schema:
        type: object
        required: [summary, mood, next_action]
        properties:
          summary:
            type: string
          mood:
            type: string
            enum: [bright, tense, calm]
          next_action:
            type: string
            enum: [celebrate, investigate, ignore]
    next: route_signal

  - id: route_signal
    type: switch
    value: "{{results.analyze_signal.next_action}}"
    cases:
      celebrate: celebrate_notice
      investigate: investigate_notice
      ignore: ignore_notice
    default: unknown_notice

  - id: celebrate_notice
    type: notify
    message: "Celebrate: {{results.analyze_signal.summary}}"

  - id: investigate_notice
    type: notify
    message: "Investigate now: {{results.analyze_signal.summary}}"

  - id: ignore_notice
    type: notify
    message: "Ignore for now: {{results.analyze_signal.summary}}"

  - id: unknown_notice
    type: notify
    message: "The signal could not be routed cleanly."
