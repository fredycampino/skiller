name: steps_render_demo
description: "Render demo for local step types in the TUI transcript"
version: "0.1"
start: intro

inputs: {}

steps:
  - notify: intro
    message: |
      Step render demo.
      This flow shows the local step outputs before waiting for input.
    next: assign_sample

  - assign: assign_sample
    values:
      action: retry
      score: 85
      summary: "assigned values for transcript rendering"
      meta:
        source: steps.yaml
    next: shell_sample

  - shell: shell_sample
    command: "printf 'shell output from steps.yaml'"
    next: switch_sample

  - switch: switch_sample
    value: '{{output_value("assign_sample").assigned.action}}'
    cases:
      retry: when_sample
      ask_human: wait_for_input
    default: wait_for_input

  - when: when_sample
    value: '{{output_value("assign_sample").assigned.score}}'
    branches:
      - gt: 90
        then: excellent_notice
      - gt: 70
        then: good_notice
    default: wait_for_input

  - notify: excellent_notice
    message: "when selected excellent"
    next: wait_for_input

  - notify: good_notice
    message: "when selected good"
    next: wait_for_input

  - wait_input: wait_for_input
    prompt: "Type anything to finish the steps render demo."
    next: done

  - notify: done
    message: '{{output_value("wait_for_input").payload.text}}'
