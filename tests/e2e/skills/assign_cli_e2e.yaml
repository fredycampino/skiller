name: assign_cli_e2e
description: "CLI e2e for assign"
version: "0.1"
start: prepare_action

inputs:
  issue: string

steps:
  - assign: prepare_action
    values:
      action: retry
      summary: "{{inputs.issue}}"
      meta:
        source: assign
    next: done

  - notify: done
    message: '{{output_value("prepare_action").assigned.action}}'
