name: llm_prompt_cli_real_e2e
inputs:
  issue: string
steps:
  - id: start
    type: llm_prompt
    system: |
      You are a technical analyst.
      Respond only with valid JSON.
    prompt: |
      Read this text:
      {{inputs.issue}}

      Return a JSON object with:
      - summary: one short sentence
      - severity: "low"
      - next_action: "retry"
    output:
      format: json
      schema:
        type: object
        required: [summary, severity, next_action]
        properties:
          summary:
            type: string
          severity:
            type: string
            enum: [low]
          next_action:
            type: string
            enum: [retry]
    next: done
  - id: done
    type: notify
    message: "{{results.start.next_action}}"
