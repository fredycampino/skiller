name: switch_cli_e2e
description: "CLI e2e for switch"
version: "0.1"
start: prepare_action

inputs:
  action: string

steps:
  - assign: prepare_action
    values:
      action: "{{inputs.action}}"
    next: decide_action

  - switch: decide_action
    value: "{{step_executions.prepare_action.output.value.assigned.action}}"
    cases:
      retry: retry_notice
      ask_human: human_notice
    default: unknown_action

  - notify: retry_notice
    message: "retry chosen"

  - notify: human_notice
    message: "human chosen"

  - notify: unknown_action
    message: "unknown chosen"
