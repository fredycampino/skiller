name: when_cli_e2e
description: "CLI e2e for when"
version: "0.1"
start: prepare_score

steps:
  - assign: prepare_score
    values:
      score: 85
    next: decide_score

  - when: decide_score
    value: "{{step_executions.prepare_score.output.value.assigned.score}}"
    branches:
      - gt: 90
        then: excellent
      - gt: 70
        then: good
    default: fail

  - notify: excellent
    message: "excellent chosen"

  - notify: good
    message: "good chosen"

  - notify: fail
    message: "fail chosen"
